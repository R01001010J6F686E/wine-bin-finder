<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search and find Wine BIN numbers instantly">
    <meta name="theme-color" content="#722f37">
    
    <title>Wine BIN Finder</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23722f37'>🍷</text></svg>">
</head>

<body>
    <main>
        <header>
            <h1>Wine BIN Finder</h1>
            <p>Search for wines by BIN number or name</p>
        </header>

        <section>
            <label for="search">Search:</label>
            <input
                type="text"
                id="search"
                placeholder="Enter BIN number or wine name..."
                aria-label="Search wines by BIN or name"
                autocomplete="off"
            >
        </section>

        <section id="results" role="region" aria-live="polite" aria-label="Search results">
            <p id="no-results-message" style="display: none;">No wines found. Try another search.</p>
        </section>

        <noscript>
            <p><strong>JavaScript is required for this application to work.</strong></p>
        </noscript>
    </main>

    <script src="app.js" defer></script>
</body>
</html>
