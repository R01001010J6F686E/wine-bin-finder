<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search and find Wine BIN numbers instantly">
    <meta name="theme-color" content="#722f37">
    <!-- Created by Richard John 454435 -->
    
    <title>Wine BIN Finder</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23722f37'>🍷</text></svg>">
    <!-- Data reference for wine database -->
    <link rel="prefetch" href="wines.json" as="fetch" type="application/json">
</head>

<body>
    <div class="grape-decoration grape-left"></div>
    <div class="grape-decoration grape-right"></div>
    
    <main class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="wine-icon">🍷</span>
                    Wine BIN Finder
                </h1>
                <p class="subtitle">Discover premium wines by BIN number or name</p>
            </div>
        </header>

        <section class="search-section">
            <div class="search-wrapper">
                <label for="search" class="search-label">🔍 Find Your Wine</label>
                <input
                    type="text"
                    id="search"
                    placeholder="Enter BIN number or wine name..."
                    aria-label="Search wines by BIN or name"
                    autocomplete="off"
                    class="search-input"
                >
            </div>
        </section>

        <section id="results" role="region" aria-live="polite" aria-label="Search results" class="results-section">
            <p id="no-results-message" style="display: none;" class="no-results">No wines found. Try another search.</p>
        </section>

        <noscript>
            <p class="noscript-message"><strong>⚠️ JavaScript is required for this application to work.</strong></p>
        </noscript>
    </main>

    <footer class="footer">
        <p>🍇 Discover the perfect wine for every occasion</p>
    </footer>

    <script src="app.js" defer></script>
</body>
</html>
